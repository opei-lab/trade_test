# セクター別 勝ち確パターン（実例ベース）
# 過去に実際に株価が動いた事実から抽出
#
# 全セクター共通 出口原則:
#   ゴール（商用化/上市/量産等）のタイムラインが明確 → 保有継続 or 恩株化
#   ゴールが不透明 → 期待値で上がった時点で全売り。流動資産に戻して複利で回す
#   不透明な株に資金を寝かせる＝機会コスト。渡り鳥戦略との相性は全売り優先
#   バイオの導出、核融合の技術ブレークスルー、量子コンピュータの実用化等、全て同じ判断軸

biotech:
  name: "バイオ・創薬"
  match: ["医薬品", "Healthcare", "Biotechnology", "Drug", "バイオ"]
  cap_limit: 50e9  # 500億未満が対象。大型バイオは動きにくい
  # バイオ株価サイクル（買いと売りのタイミング）:
  #   底値圏（買い）→ 臨床データ良好（じわ上げ）→ 導出（ピーク＝利確）→ Phase3以降（運ゲー）
  #   導出がゴール。上市まで持つ必要はない。導出後はリスクだけ増える
  patterns:
    - name: "先駆け審査指定（SAKIGAKE）"
      description: "PMDAの先駆け審査指定。審査期間12ヶ月→6ヶ月に短縮。指定時点で+30-100%"
      ir_keywords: ["先駆け", "SAKIGAKE", "先駆け審査"]
      confidence: 90
      typical_move: "1.3-2倍"
      timeframe: "指定発表即日"
      trap: "指定されても試験失敗リスクは残る"

    - name: "条件付き早期承認"
      description: "Phase 2結果で条件付き承認。臨床データが圧倒的なら早期承認のトリガーになる"
      ir_keywords: ["条件付き早期承認", "条件付き承認", "期限付承認", "ブレークスルーセラピー", "画期的治療薬"]
      confidence: 85
      typical_move: "1.5-3倍"
      timeframe: "承認発表即日"
      high_conviction_if:
        - "既存薬耐性例に有効（アンメットメディカルニーズが高い）"
        - "併用で標準治療を超える有意な上乗せ効果"
        - "奏功率が圧倒的（ORR 80%超、CR率が高い等）"
        - "ファーストインクラス（同一機序の承認薬なし）"
      low_conviction_if:
        - "効果量が僅差（統計的有意でも臨床的意義が乏しい）"
        - "小規模試験のみ（N<50）で再現性が不明"
        - "既に同一機序の競合薬が承認済み"
      trap: "条件付きなので市販後調査で取消リスクあり。早期承認は臨床データの圧倒的な強さが前提"

    - name: "Phase 3主要評価項目達成→承認申請"
      description: "Phase 3成功→申請後の承認確率85-90%。申請で一山、承認で一山"
      ir_keywords: ["主要評価項目達成", "Phase 3", "第3相", "有意差", "承認申請", "NDA", "BLA"]
      confidence: 85
      typical_move: "1.5-3倍"
      timeframe: "申請→承認: 6-18ヶ月"
      high_conviction_if:
        - "主要評価項目でp<0.001（統計的に圧倒的）"
        - "既存薬耐性患者にも有効"
        - "安全性プロファイルが良好（重篤な副作用少ない）"
      low_conviction_if:
        - "効果量が小さい（HR 0.8程度では市場反応薄い）"
        - "競合薬のPhase 3も進行中（承認されても差別化困難）"
      trap: "効果量が小さいとPhase 3成功でも市場が反応しない。p値だけでなく臨床的意義を確認"

    - name: "メガファーマ導出契約"
      description: "大手製薬へのライセンス。バイオ株価サイクルの最大ピーク。導出が利確ポイント（上市まで持つのは運ゲー）"
      ir_keywords: ["導出", "ライセンス契約", "ライセンスアウト", "提携契約", "マイルストーン", "ロイヤリティ"]
      confidence: 95
      typical_move: "5-20倍（小型バイオ。大型は2-5倍）"
      timeframe: "発表即日-数週間。マイルストーン毎に追加上昇"
      exit_strategy: |
        導出時の判断フロー:
        1. 上市タイムラインが明確か？（条件付き承認可能/Phase3スキップ/年内Phase2完了等）
           → Yes: 恩株化して上市まで保有も合理的（ゴール近い＝運ゲー期間短い）
           → No: 次の判断へ
        2. 利益が十分に大きいか？
           → Yes（5倍超等）: 恩株化も選択肢（元本回収済でリスクゼロ）
           → No: 全売り
        3. 不透明な場合は全売り一択。
           理由: 流動資産に戻して次の確度高い銘柄に渡る方が複利効果を期待できる。
           不透明な株に資金を寝かせる＝機会コスト。渡り鳥戦略との相性は全売り優先
      high_conviction_if:
        - "ファーストインクラス＋臨床データが公開されている（効果に自信がある証拠）"
        - "ブロックバスター市場（年間売上$1B超の市場）"
        - "契約一時金が時価総額の10%超"
        - "導出先が当該領域でパイプライン薄い（自社競合なし→棚上げ動機なし）"
        - "奏功率・有効性データが具体的に開示されている"
      low_conviction_if:
        - "導出先が同一機序の自社品を持っている（競合排除目的の可能性）"
        - "契約一時金が小さく、マイルストーン偏重（開発中止で消滅）"
        - "併用試験での上乗せ効果が不明確"
        - "導出先が中堅ファーマ（開発リソース不足で遅延リスク）"
        - "ファーストインクラスだが臨床データ非開示（データを出せない＝効果が微妙な可能性）"
      trap: "ギリアド等は競合排除目的で一時金だけ払い棚上げする戦略あり。導出＝開発継続ではない。要注意: ファーストインクラスを理由に導出したが臨床データ非開示の場合、データを出せない（効果が微妙）可能性あり。本当に良いデータなら公開した方が株価も上がるため、伏せる理由がない"
      example: "そーせい: Heptares経由メガファーマ導出15-20倍（ファーストインクラスGPCR）。ペプチドリーム: BMS等複数導出10倍超"

    - name: "前回臨床データ良好→次回学会発表控え"
      description: "前回の試験で奏功率が高く、次の学会でデータ発表が予定されている"
      ir_keywords: ["奏功率", "完全寛解", "部分奏功", "ORR", "CR", "PR", "学会発表"]
      confidence: 70
      typical_move: "1.5-3倍"
      timeframe: "学会まで"
      trap: "小規模試験の結果は大規模で再現しないことがある"
      example: "カルナバイオ: 前回データ良好→6月ASCO待ち"

    - name: "希少疾病用医薬品指定（オーファン）"
      description: "患者5万人未満。優先審査+助成金+独占販売期間。指定で+20-50%"
      ir_keywords: ["希少疾病", "オーファン", "希少疾患"]
      confidence: 75
      typical_move: "1.2-1.5倍"
      timeframe: "指定発表即日"

  traps:
    - "MSワラント（新株予約権）の乱発で希釈される"
    - "IR巧者: 適時開示のタイミングを操作して株価維持する企業"
    - "コロナ関連テーマ: 期待先行で実態が伴わない"
    - "Phase 2で有意差ありでも効果量が小さいと失敗する"

