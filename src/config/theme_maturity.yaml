# テーマ成熟度判定ルール
# テーマが「本物」か「期待先行」かを判定するための共通シグナル
# themes.yamlのテーマに対して自動適用される

# === 本物シグナル（confirmed） ===
# これらのキーワードがIR/ニュースにあれば、テーマとして実需がある証拠
confirmed_signals:
  # 政府・制度
  - 政府予算
  - 補助金
  - 国策
  - 閣議決定
  - 基本計画
  - 規制緩和
  - 法改正
  - 国家戦略
  - 経済安保
  - 防衛予算

  # 大企業の動き
  - 大手参入
  - 設備投資
  - CAPEX
  - 工場建設
  - 量産
  - 量産開始
  - 出荷開始
  - 納入開始
  - 商用化
  - 大口受注

  # 実績
  - 売上計上
  - 黒字化
  - 受注残
  - 契約締結
  - 採用決定
  - 導入実績

# === 初期シグナル（emerging） ===
# テーマ化の初期段階。まだ実需は少ないがウォッチすべき
emerging_signals:
  - 実証実験
  - PoC
  - 概念実証
  - パイロット
  - 試験運用
  - 共同研究
  - 技術提携
  - 特許取得
  - 特許出願
  - 学会発表
  - 論文
  - プロトタイプ
  - サンプル出荷

# === 期待先行シグナル（hype） ===
# テーマとして話題だが実態が伴わない可能性
hype_signals:
  - テーマ株
  - 思惑
  - 関連銘柄
  - 材料視
  - 期待先行
  - 夢
  - 構想
  - ビジョン
  - 将来的に
  - 検討中
  - 研究段階

# === 成熟度判定ロジック ===
# confirmed_signals が2個以上 → maturity: "confirmed"（本物。投資対象）
# emerging_signals が2個以上 → maturity: "emerging"（初期。ウォッチ対象）
# hype_signals のみ or シグナルなし → maturity: "hype"（期待先行。慎重に）
#
# 補足判定:
# - 大型株（時価総額1000億超）が参入 → confirmed寄りに補正
# - 小型株のみ → hype寄りに補正
# - 政府予算・補助金あり → confirmed（国策テーマは確実に来る）
