# ============================================================
# impact_keywords.yaml
# キーワードベースの全検出ロジックの単一ソース
# コード変更なしでキーワードを追加・修正可能にする
# ============================================================

# ------------------------------------------------------------
# 1. high_impact: 高インパクトキーワード
#    これらがIR/ニュースに含まれる場合、強いポジティブシグナル
#    スコア計算: 1キーワードにつき +25点
# ------------------------------------------------------------
high_impact:
  - 黒字
  - 上方修正
  - 最高益
  - 承認
  - 提携
  - 契約
  - 受注
  - 導出
  - 買収
  - 増配
  - 自社株買

# ------------------------------------------------------------
# 2. medium_impact: 中インパクトキーワード
#    業績好調や事業拡大の兆候
#    スコア計算: 1キーワードにつき +10点
# ------------------------------------------------------------
medium_impact:
  - 増収
  - 増益
  - 好調
  - 拡大
  - 成長
  - 新規
  - 開始
  - 発表

# ------------------------------------------------------------
# 3. negative_impact: ネガティブキーワード
#    希薄化リスク、開発中止、業績悪化等
#    スコア計算: 1キーワードにつき -20点
# ------------------------------------------------------------
negative_impact:
  - 下方修正
  - 赤字
  - 減損
  - ワラント
  - 増資
  - 希薄化
  - 廃止
  - 減配
  - 中止
  - 中断
  - 終了
  - 返還
  - リジェクト
  - 不承認
  - 治験中止
  - 開発中止

# ------------------------------------------------------------
# 4. context_rules: 文脈依存キーワード
#    単体では曖昧なキーワードの文脈判定ルール
#    positive_context/negative_contextに一致する場合はそちらを優先
#    どちらにも一致しない場合はdefaultを使用
# ------------------------------------------------------------
context_rules:
  拡大:
    positive_context:
      - 利益拡大
      - 売上拡大
      - 事業拡大
      - シェア拡大
      - 市場拡大
      - 販路拡大
    negative_context:
      - 赤字拡大
      - 損失拡大
      - 債務拡大
      - 欠損拡大
    default: neutral

  成長:
    positive_context:
      - 売上成長
      - 利益成長
      - 事業成長
      - 高成長
    negative_context:
      - 成長鈍化
      - 成長減速
    default: positive

  増資:
    positive_context: []  # 増資は基本的にネガティブ
    negative_context:
      - 第三者割当増資
      - 公募増資
      - 新株発行
    default: negative

  開始:
    positive_context:
      - 量産開始
      - 出荷開始
      - サービス開始
      - 販売開始
      - 受注開始
      - 納入開始
      - 臨床試験開始
    negative_context:
      - 調査開始     # 不祥事調査
    default: neutral

  発表:
    positive_context:
      - 学会発表
      - 新製品発表
    negative_context:
      - 遅延発表
      - 中止発表
    default: neutral

# ------------------------------------------------------------
# 5. scenario_labels: シナリオ構築用のキーワード→ラベルマッピング
#    IRタイトルに含まれるキーワードから、シナリオ文を自動生成する
#    keywords: 検出キーワード（いずれか1つでもマッチすればOK）
#    label: シナリオに表示するラベル
# ------------------------------------------------------------
scenario_labels:
  - keywords: ["承認", "PMDA"]
    label: "承認関連のIRあり"

  - keywords: ["提携", "契約", "導出", "ライセンス"]
    label: "提携/導出関連のIRあり ※一時金規模と開発継続意思を要確認（棚上げリスク）"

  - keywords: ["学会", "ASCO", "AACR", "ASH"]
    label: "学会発表関連のIRあり"

  - keywords: ["上方修正", "増益", "増収", "最高益"]
    label: "業績好調のIRあり"

  - keywords: ["黒字", "黒字化"]
    label: "黒字転換のIRあり"

  - keywords: ["受注", "採用", "量産"]
    label: "受注/採用のIRあり"

  - keywords: ["ワラント", "新株予約権", "増資"]
    label: "⚠ 希薄化リスクのIRあり"

  - keywords: ["中止", "中断", "終了", "返還", "リジェクト", "不承認"]
    label: "⚠ パイプライン脱落/開発中止のIRあり"

# ------------------------------------------------------------
# 6. goal_near_keywords: ゴール接近キーワード
#    商用化・上市・量産等のタイムラインが見える兆候
#    マッチ時: 恩株化して保有継続も合理的
# ------------------------------------------------------------
goal_near_keywords:
  # バイオ関連
  - 条件付き承認
  - 条件付き早期承認
  - 期限付承認
  - 承認申請
  - Phase 3スキップ
  - ブレークスルー
  - 画期的治療薬
  - 先駆け審査
  - 再生医療
  - 希少疾病
  - オーファン
  - 承認取得
  - 製造販売承認
  # 技術・製造関連
  - 量産開始
  - 商用化
  - 実用化
  - 納入開始
  - 出荷開始
  - サービス開始
  - 受注開始
  - 売上計上
  - 黒字化見通し

# ------------------------------------------------------------
# 7. hype_keywords: 期待先行カタリスト
#    ゴールが見えないが株価が動きうるイベント
#    マッチ時かつゴール不透明: 期待値で上がった時点で全売り推奨
# ------------------------------------------------------------
hype_keywords:
  - 導出
  - ライセンス契約
  - ライセンスアウト
  - 提携契約
  - 技術実証
  - 実験成功
  - プロトタイプ
  - 概念実証
  - PoC

# ------------------------------------------------------------
# 8. noise_patterns: ノイズフィルタ
#    市場全体の記事やテクニカル分析記事を除外するパターン
#    銘柄固有でないニュースを取り除く
# ------------------------------------------------------------
noise_patterns:
  # テクニカル系（遅行指標 → 分析に無価値）
  - "本日の【"
  - 均衡表
  - ゴールデンクロス
  - デッドクロス
  - "上抜け／下抜け"
  - 3役好転
  - 3役逆転
  - "銘柄　"       # 一覧記事のノイズ
  - "GC＝"
  - "DC＝"
  - "好転＝"
  - "逆転＝"

# ------------------------------------------------------------
# 9. bio_pipeline: バイオ・パイプライン検出用キーワード
#    臨床試験フェーズ、疾患名、試験結果の判定に使用
# ------------------------------------------------------------
bio_pipeline:
  # フェーズ検出: キーワード → 正規化フェーズ名
  phase_keywords:
    "Phase 1": "Phase 1"
    "Phase1": "Phase 1"
    "第1相": "Phase 1"
    "第I相": "Phase 1"
    "P1": "Phase 1"
    "Phase 2": "Phase 2"
    "Phase2": "Phase 2"
    "第2相": "Phase 2"
    "第II相": "Phase 2"
    "P2": "Phase 2"
    "Phase 3": "Phase 3"
    "Phase3": "Phase 3"
    "第3相": "Phase 3"
    "第III相": "Phase 3"
    "P3": "Phase 3"
    "前臨床": "Preclinical"
    "非臨床": "Preclinical"
    "臨床試験": "Clinical"    # フェーズ不明の場合
    "治験": "Clinical"

  # 疾患名キーワード（パイプライン特定用）
  disease_keywords:
    # がん
    - 肺がん
    - 乳がん
    - 大腸がん
    - 胃がん
    - 肝臓がん
    - 膵臓がん
    - 前立腺がん
    - 卵巣がん
    - 白血病
    - リンパ腫
    - 骨髄腫
    - 固形がん
    - 血液がん
    - メラノーマ
    - 膀胱がん
    - 腎細胞がん
    - 頭頸部がん
    # 自己免疫・炎症
    - 関節リウマチ
    - アトピー性皮膚炎
    - 潰瘍性大腸炎
    - クローン病
    - 乾癬
    - ループス
    # 神経・精神
    - アルツハイマー
    - パーキンソン
    - ALS
    - 筋萎縮性側索硬化症
    - 認知症
    - 統合失調症
    - うつ病
    # 代謝・循環器
    - 糖尿病
    - NASH
    - 非アルコール性脂肪肝炎
    - 高血圧
    - 心不全
    - 動脈硬化
    # 希少疾患
    - 希少疾患
    - 難病
    - オーファン
    # 感染症
    - COVID
    - インフルエンザ
    - B型肝炎
    - C型肝炎
    - HIV
    # 眼科
    - 加齢黄斑変性
    - 緑内障
    - 網膜色素変性

  # 試験結果ポジティブ: 承認に近づくシグナル
  positive_trial:
    - 主要評価項目達成
    - 有意差あり
    - 有意差を確認
    - 統計学的有意
    - 奏功率
    - 完全奏功
    - 完全寛解
    - 部分奏功
    - 全生存期間延長
    - 無増悪生存期間
    - 優越性を検証
    - 非劣性を検証
    - ORR
    - CR率
    - 安全性確認
    - 良好な忍容性
    - 用量設定完了
    - 患者登録完了
    - 被験者登録完了

  # 試験結果ネガティブ: パイプライン脱落リスク
  negative_trial:
    - 主要評価項目未達
    - 有意差なし
    - 有意差認められず
    - 未達
    - 中止
    - 治験中止
    - 開発中止
    - 安全性懸念
    - 重篤な副作用
    - 患者登録中断
    - 被験者登録中断
    - FDA完全回答書
    - CRL
    - リジェクト
    - 不承認
    - 返還

# ------------------------------------------------------------
# 10. news_analyzer_keywords: ニュース分析用キーワード
#     LLMなし環境でのキーワードマッチング用
#     （news_analyzer.pyのanalyze_news_for_stage_change用）
# ------------------------------------------------------------
news_analyzer_keywords:
  positive:
    - 黒字
    - 上方修正
    - 増収増益
    - 最高益
    - 提携
    - 契約
    - 承認
    - 受注
    - 採用
  negative:
    - 下方修正
    - 赤字
    - 減損
    - ワラント
    - 増資
    - 希薄化
    - 廃止

# ------------------------------------------------------------
# スコア計算の重み設定
# scenario.pyのimpact_score計算で使用
# ------------------------------------------------------------
scoring:
  high_impact_weight: 25    # high_impact 1キーワードあたりの加点
  medium_impact_weight: 10  # medium_impact 1キーワードあたりの加点
  negative_impact_weight: 20  # negative_impact 1キーワードあたりの減点
  max_score: 100
  min_score: 0
